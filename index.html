<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智慧會議時間媒合系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons for beautiful visuals -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div id="root"></div>

  <!-- =====================================================
       Firebase 設定 — 請填入您的 Firebase 專案資訊
       步驟：
       1. 前往 https://console.firebase.google.com
       2. 建立新專案（或選擇既有專案）
       3. 點左側 Realtime Database → 建立資料庫 → 選擇地區 → 以測試模式啟動
       4. 點右上角齒輪 → 專案設定 → 您的應用程式 → 複製設定貼到下方
       ===================================================== -->
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyC0_8fZc533lbZ9YrsATKUFrCCjtT3siqY",
      authDomain: "cindyvibecoding.firebaseapp.com",
      databaseURL: "https://cindyvibecoding-default-rtdb.firebaseio.com",
      projectId: "cindyvibecoding",
      storageBucket: "cindyvibecoding.firebasestorage.app",
      messagingSenderId: "923286315467",
      appId: "1:923286315467:web:225e78c80f1fd64dc3564e",
    };

    var isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";
    var db = null;

    if (isFirebaseConfigured) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
      } catch (e) {
        console.error("Firebase 初始化失敗:", e);
      }
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name, className]);
      return <i data-lucide={name} class={`${className}`} {...props}></i>;
    };

    // Firebase 路徑
    const MEETING_REF = 'meeting-v1';

    // 將 Firebase 回傳值（可能是 object 或 array）統一轉為 array
    const toArray = (val) => {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      return Object.values(val);
    };

    const parseSlots = (rawSlots) => {
      if (!rawSlots) return [];
      return toArray(rawSlots).filter(Boolean).map(slot => ({
        ...slot,
        times: toArray(slot.times).filter(Boolean)
      }));
    };

    const parseVotes = (rawVotes) => {
      if (!rawVotes) return {};
      return Object.fromEntries(
        Object.entries(rawVotes).map(([name, v]) => [name, toArray(v).filter(Boolean)])
      );
    };

    // 資料庫第一次使用時的預設資料
    const DEFAULT_DATA = {
      title: "2026年第二季產品策略規劃會議",
      desc: "請大家勾選自己方便的時間，Agent 會自動整合出最合適的開會時段。",
      members: ["小明", "阿華", "美玲", "佳豪", "雅婷", "陳經理", "林設計師"],
      slots: [
        { id: "slot-1", date: "2026-06-08 (一)", times: ["09:30 - 11:30", "14:00 - 16:00", "16:30 - 18:30"] },
        { id: "slot-2", date: "2026-06-09 (二)", times: ["10:00 - 12:00", "13:30 - 15:30", "16:00 - 18:00"] },
        { id: "slot-3", date: "2026-06-10 (三)", times: ["09:00 - 11:00", "14:00 - 16:00", "19:00 - 21:00"] },
        { id: "slot-4", date: "2026-06-11 (四)", times: ["10:30 - 12:30", "15:00 - 17:00", "17:30 - 19:30"] }
      ],
      votes: {
        "小明": ["2026-06-08 (一)_09:30 - 11:30", "2026-06-08 (一)_14:00 - 16:00", "2026-06-09 (二)_10:00 - 12:00"],
        "阿華": ["2026-06-08 (一)_09:30 - 11:30", "2026-06-10 (三)_09:00 - 11:00", "2026-06-11 (四)_15:00 - 17:00"],
        "美玲": ["2026-06-08 (一)_09:30 - 11:30", "2026-06-09 (二)_10:00 - 12:00", "2026-06-10 (三)_14:00 - 16:00", "2026-06-11 (四)_15:00 - 17:00"],
        "陳經理": ["2026-06-08 (一)_14:00 - 16:00", "2026-06-09 (二)_10:00 - 12:00", "2026-06-10 (三)_14:00 - 16:00"]
      }
    };

    // ===================== 設定引導畫面 =====================
    function SetupGuide() {
      return (
        <div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 to-indigo-100">
          <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-8 md:p-12">
            <div class="flex items-center gap-3 mb-6">
              <div class="p-3 bg-indigo-600 rounded-2xl text-white">
                <Icon name="database" className="w-7 h-7" />
              </div>
              <div>
                <h1 class="text-2xl font-extrabold text-slate-900">需要設定 Firebase</h1>
                <p class="text-sm text-slate-500">完成後所有人即可透過連結投票並即時同步</p>
              </div>
            </div>

            <div class="space-y-4">
              {[
                { step: "1", title: "建立 Firebase 專案", desc: "前往 console.firebase.google.com，點「新增專案」，輸入名稱即可（不需要啟用 Analytics）" },
                { step: "2", title: "建立 Realtime Database", desc: "在左側選單找到「Realtime Database」→ 點「建立資料庫」→ 選擇地區 → 選「以測試模式啟動」" },
                { step: "3", title: "複製設定", desc: "點右上角齒輪圖示 → 「專案設定」→ 往下滾到「您的應用程式」→ 新增網頁應用程式 → 複製 firebaseConfig 的內容" },
                { step: "4", title: "貼入 index.html", desc: "打開 index.html，找到 firebaseConfig 區塊，將複製的 apiKey、databaseURL 等資訊填入對應欄位" },
                { step: "5", title: "上傳到 GitHub Pages", desc: "git add . → git commit → git push，然後在 GitHub repo 設定中啟用 Pages，選 main branch" }
              ].map(({ step, title, desc }) => (
                <div key={step} class="flex gap-4 p-4 rounded-2xl border border-slate-100 hover:border-indigo-100 hover:bg-slate-50 transition-all">
                  <div class="w-8 h-8 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-bold text-sm shrink-0">
                    {step}
                  </div>
                  <div>
                    <p class="font-bold text-slate-800">{title}</p>
                    <p class="text-sm text-slate-500 mt-0.5">{desc}</p>
                  </div>
                </div>
              ))}
            </div>

            <div class="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-2xl text-sm text-amber-800">
              <strong>安全規則提醒：</strong>測試模式下，資料庫是公開讀寫的，適合投票工具。若想增加安全性，可在 Firebase Console 的 Rules 中設定規則。
            </div>
          </div>
        </div>
      );
    }

    // ===================== 載入畫面 =====================
    function LoadingScreen() {
      return (
        <div class="min-h-screen flex items-center justify-center">
          <div class="text-center space-y-4">
            <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto"></div>
            <p class="text-slate-500 font-medium">連接資料庫中...</p>
          </div>
        </div>
      );
    }

    // ===================== 主應用程式 =====================
    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [meetingTitle, setMeetingTitle] = useState("");
      const [meetingDesc, setMeetingDesc] = useState("");
      const [invitedMembers, setInvitedMembers] = useState([]);
      const [calendarSlots, setCalendarSlots] = useState([]);
      const [votes, setVotes] = useState({});

      const [voterName, setVoterName] = useState("");
      const [tempSelections, setTempSelections] = useState([]);
      const [hasVotedBefore, setHasVotedBefore] = useState(false);

      const [isAdminMode, setIsAdminMode] = useState(false);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [loginUser, setLoginUser] = useState("");
      const [loginPass, setLoginPass] = useState("");
      const [loginError, setLoginError] = useState("");
      const [newDateInput, setNewDateInput] = useState("");
      const [newTimeInput, setNewTimeInput] = useState("");
      const [selectedDateForNewTime, setSelectedDateForNewTime] = useState("");
      const [newMemberInput, setNewMemberInput] = useState("");

      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        if (loginUser === 'admin' && loginPass === 'cindyalwayslate') {
          setIsAdminMode(true);
          setShowAdminLogin(false);
          setLoginUser('');
          setLoginPass('');
          setLoginError('');
          showNotification('已進入管理模式');
        } else {
          setLoginError('帳號或密碼錯誤');
        }
      };

      // ── Firebase 即時監聽 ──────────────────────────────
      useEffect(() => {
        if (!window.db) {
          setIsLoading(false);
          return;
        }

        const ref = window.db.ref(MEETING_REF);

        const handleData = (snapshot) => {
          const data = snapshot.val();

          if (!data) {
            // 第一次使用，寫入預設資料
            ref.set(DEFAULT_DATA);
            return; // set() 之後 listener 會再次觸發
          }

          setMeetingTitle(data.title || DEFAULT_DATA.title);
          setMeetingDesc(data.desc || DEFAULT_DATA.desc);
          setInvitedMembers(toArray(data.members).filter(Boolean));
          setCalendarSlots(parseSlots(data.slots));
          setVotes(parseVotes(data.votes));
          setIsLoading(false);
        };

        ref.on('value', handleData, (err) => {
          console.error('Firebase 連線失敗:', err);
          setIsLoading(false);
        });

        return () => ref.off('value', handleData);
      }, []);

      // 選日期下拉預設值
      useEffect(() => {
        if (calendarSlots.length > 0 && !selectedDateForNewTime) {
          setSelectedDateForNewTime(calendarSlots[0].date);
        }
      }, [calendarSlots]);

      // 偵測是否曾投過票，幫忙預載舊選擇
      useEffect(() => {
        if (voterName.trim() && votes[voterName.trim()]) {
          setTempSelections(votes[voterName.trim()]);
          setHasVotedBefore(true);
        } else {
          setTempSelections([]);
          setHasVotedBefore(false);
        }
      }, [voterName, votes]);

      // ── 投票操作 ──────────────────────────────────────
      const handleToggleSlot = (date, time) => {
        if (!voterName.trim()) {
          showNotification("請先輸入您的名字，才能開始勾選時間喔！", "warning");
          return;
        }
        const key = `${date}_${time}`;
        if (tempSelections.includes(key)) {
          setTempSelections(tempSelections.filter(item => item !== key));
        } else {
          setTempSelections([...tempSelections, key]);
        }
      };

      const handleSubmitVote = (e) => {
        e.preventDefault();
        const trimmedName = voterName.trim();
        if (!trimmedName) {
          showNotification("請輸入姓名後再提交！", "error");
          return;
        }

        // 只更新這個人的投票，不覆蓋其他人
        window.db.ref(`${MEETING_REF}/votes/${trimmedName}`).set(tempSelections);

        if (!invitedMembers.includes(trimmedName)) {
          window.db.ref(`${MEETING_REF}/members`).set([...invitedMembers, trimmedName]);
        }

        showNotification(
          hasVotedBefore
            ? `更新成功！${trimmedName} 的可用時段已成功重新記錄。`
            : `投票成功！感謝 ${trimmedName} 參與時間協調。`,
          "success"
        );

        setVoterName("");
        setTempSelections([]);
      };

      const handleClearSelections = () => setTempSelections([]);

      // ── 統計計算 ──────────────────────────────────────
      const statistics = useMemo(() => {
        const stats = [];
        calendarSlots.forEach(slot => {
          slot.times.forEach(time => {
            const key = `${slot.date}_${time}`;
            const okPeople = [];
            Object.entries(votes).forEach(([name, chosenKeys]) => {
              if (chosenKeys.includes(key)) okPeople.push(name);
            });
            stats.push({ key, date: slot.date, time, count: okPeople.length, people: okPeople });
          });
        });
        return stats.sort((a, b) => b.count - a.count);
      }, [calendarSlots, votes]);

      const bestSlots = useMemo(() => {
        if (statistics.length === 0) return [];
        const maxCount = statistics[0].count;
        if (maxCount === 0) return [];
        return statistics.filter(s => s.count === maxCount);
      }, [statistics]);

      const votersStatus = useMemo(() => {
        const voted = Object.keys(votes);
        const unvoted = invitedMembers.filter(m => !voted.includes(m));
        return { voted, unvoted };
      }, [invitedMembers, votes]);

      // ── 管理功能（全部寫到 Firebase，state 由 listener 更新）──
      const handleToggleAdminMode = () => {
        if (isAdminMode) {
          // 退出管理模式時同步標題與說明
          window.db.ref(`${MEETING_REF}/title`).set(meetingTitle);
          window.db.ref(`${MEETING_REF}/desc`).set(meetingDesc);
          showNotification("設定已儲存！", "success");
        }
        setIsAdminMode(!isAdminMode);
      };

      const handleAddDate = (e) => {
        e.preventDefault();
        if (!newDateInput.trim()) return;
        if (calendarSlots.some(s => s.date === newDateInput.trim())) {
          showNotification("該日期已存在行事曆中囉！", "warning");
          return;
        }
        const newSlot = {
          id: `slot-${Date.now()}`,
          date: newDateInput.trim(),
          times: ["09:00 - 11:00", "14:00 - 16:00"]
        };
        window.db.ref(`${MEETING_REF}/slots`).set([...calendarSlots, newSlot]);
        setNewDateInput("");
        showNotification(`已成功新增日期：${newSlot.date}`);
      };

      const handleDeleteDate = (dateToDelete) => {
        window.db.ref(`${MEETING_REF}/slots`).set(calendarSlots.filter(s => s.date !== dateToDelete));
        const updatedVotes = {};
        Object.entries(votes).forEach(([name, keys]) => {
          updatedVotes[name] = keys.filter(key => !key.startsWith(dateToDelete));
        });
        window.db.ref(`${MEETING_REF}/votes`).set(updatedVotes);
        showNotification(`已移除日期 ${dateToDelete} 及其所有相關投票數據`, "warning");
      };

      const handleAddTime = (e) => {
        e.preventDefault();
        if (!newTimeInput.trim() || !selectedDateForNewTime) return;

        let alreadyExists = false;
        const newSlots = calendarSlots.map(slot => {
          if (slot.date === selectedDateForNewTime) {
            if (slot.times.includes(newTimeInput.trim())) {
              alreadyExists = true;
              return slot;
            }
            return { ...slot, times: [...slot.times, newTimeInput.trim()].sort() };
          }
          return slot;
        });

        if (alreadyExists) {
          showNotification("該時段已存在！", "warning");
          return;
        }

        window.db.ref(`${MEETING_REF}/slots`).set(newSlots);
        setNewTimeInput("");
        showNotification(`已為 ${selectedDateForNewTime} 新增時段 ${newTimeInput}`);
      };

      const handleDeleteTime = (date, timeToDelete) => {
        const newSlots = calendarSlots.map(slot => {
          if (slot.date === date) {
            return { ...slot, times: slot.times.filter(t => t !== timeToDelete) };
          }
          return slot;
        });
        window.db.ref(`${MEETING_REF}/slots`).set(newSlots);

        const targetKey = `${date}_${timeToDelete}`;
        const updatedVotes = {};
        Object.entries(votes).forEach(([name, keys]) => {
          updatedVotes[name] = keys.filter(key => key !== targetKey);
        });
        window.db.ref(`${MEETING_REF}/votes`).set(updatedVotes);
        showNotification(`已移除時段：${date} ${timeToDelete}`, "warning");
      };

      const handleAddMember = (e) => {
        e.preventDefault();
        const name = newMemberInput.trim();
        if (!name) return;
        if (invitedMembers.includes(name)) {
          showNotification("此人員已在名單中！", "warning");
          return;
        }
        window.db.ref(`${MEETING_REF}/members`).set([...invitedMembers, name]);
        setNewMemberInput("");
        showNotification(`成功邀請新成員：${name}`);
      };

      const handleRemoveMember = (nameToRemove) => {
        window.db.ref(`${MEETING_REF}/members`).set(invitedMembers.filter(m => m !== nameToRemove));
        const updatedVotes = { ...votes };
        delete updatedVotes[nameToRemove];
        window.db.ref(`${MEETING_REF}/votes`).set(updatedVotes);
        showNotification(`已移除成員：${nameToRemove}`);
      };

      const handleResetAllVotes = () => {
        if (confirm("您確定要清除所有已投的票嗎？此動作無法復原喔！")) {
          window.db.ref(`${MEETING_REF}/votes`).set({});
          showNotification("所有投票數據已清空！", "warning");
        }
      };

      // ── 頁面渲染 ──────────────────────────────────────
      if (!window.isFirebaseConfigured) return <SetupGuide />;
      if (isLoading) return <LoadingScreen />;

      return (
        <div class="max-w-7xl mx-auto px-4 py-8">
          {/* 通知系統 */}
          {notification && (
            <div class={`fixed top-5 right-5 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-0 border text-sm md:text-base ${
              notification.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
              notification.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
              'bg-rose-50 border-rose-200 text-rose-800'
            }`}>
              <Icon
                name={notification.type === 'success' ? 'check-circle' : 'alert-circle'}
                className={`w-6 h-6 ${
                  notification.type === 'success' ? 'text-emerald-500' :
                  notification.type === 'warning' ? 'text-amber-500' :
                  'text-rose-500'
                }`}
              />
              <span class="font-medium">{notification.message}</span>
            </div>
          )}

          {/* 管理員登入 Modal */}
          {showAdminLogin && (
            <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={(e) => { if (e.target === e.currentTarget) { setShowAdminLogin(false); setLoginError(''); } }}>
              <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm mx-4">
                <div class="flex items-center gap-3 mb-6">
                  <div class="p-2.5 bg-indigo-600 rounded-2xl text-white">
                    <Icon name="lock" className="w-5 h-5" />
                  </div>
                  <div>
                    <h2 class="text-lg font-bold text-slate-900">管理員驗證</h2>
                    <p class="text-xs text-slate-400">請輸入管理員帳號與密碼</p>
                  </div>
                </div>

                <form onSubmit={handleAdminLoginSubmit} class="space-y-4">
                  <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">帳號</label>
                    <input
                      type="text"
                      value={loginUser}
                      onChange={(e) => setLoginUser(e.target.value)}
                      autoFocus
                      autoComplete="username"
                      class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-slate-800"
                      required
                    />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">密碼</label>
                    <input
                      type="password"
                      value={loginPass}
                      onChange={(e) => setLoginPass(e.target.value)}
                      autoComplete="current-password"
                      class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-slate-800"
                      required
                    />
                  </div>

                  {loginError && (
                    <p class="text-sm text-rose-600 font-medium flex items-center gap-1.5">
                      <Icon name="alert-circle" className="w-4 h-4" />
                      {loginError}
                    </p>
                  )}

                  <div class="flex gap-3 pt-2">
                    <button
                      type="button"
                      onClick={() => { setShowAdminLogin(false); setLoginError(''); }}
                      class="flex-1 py-2.5 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all"
                    >
                      取消
                    </button>
                    <button
                      type="submit"
                      class="flex-1 py-2.5 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-sm transition-all"
                    >
                      登入
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

                <Icon name="sliders" className="text-amber-400 w-6 h-6" />
                <div>
                  <h2 class="text-xl font-bold">⚙️ 發起人進階管理面板</h2>
                  <p class="text-xs text-slate-400">重新定義會議主題、新增/刪除行程日期、編輯受邀成員名單。標題與說明在點「完成管理設定」後儲存。</p>
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                {/* 新增日期 */}
                <div class="space-y-4">
                  <h3 class="text-sm font-bold text-amber-300 flex items-center gap-1.5">
                    <Icon name="calendar-plus" className="w-4 h-4" />
                    新增行程日期
                  </h3>
                  <form onSubmit={handleAddDate} class="space-y-3">
                    <div>
                      <label class="block text-xs text-slate-400 mb-1">日期格式 (如: 2026-06-12 (五))</label>
                      <input
                        type="text"
                        value={newDateInput}
                        onChange={(e) => setNewDateInput(e.target.value)}
                        placeholder="請輸入日期"
                        class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm text-white"
                        required
                      />
                    </div>
                    <button
                      type="submit"
                      class="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-bold py-2 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1"
                    >
                      <Icon name="plus" className="w-3.5 h-3.5" />
                      新增日期
                    </button>
                  </form>
                </div>

                {/* 新增時段 */}
                <div class="space-y-4">
                  <h3 class="text-sm font-bold text-amber-300 flex items-center gap-1.5">
                    <Icon name="clock" className="w-4 h-4" />
                    為日期新增特定時段
                  </h3>
                  <form onSubmit={handleAddTime} class="space-y-3">
                    <div>
                      <label class="block text-xs text-slate-400 mb-1">選擇指定日期</label>
                      <select
                        value={selectedDateForNewTime}
                        onChange={(e) => setSelectedDateForNewTime(e.target.value)}
                        class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm text-white"
                      >
                        {calendarSlots.map(s => (
                          <option key={s.id} value={s.date}>{s.date}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label class="block text-xs text-slate-400 mb-1">時段格式 (如: 14:00 - 16:00)</label>
                      <input
                        type="text"
                        value={newTimeInput}
                        onChange={(e) => setNewTimeInput(e.target.value)}
                        placeholder="請輸入時段"
                        class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm text-white"
                        required
                      />
                    </div>
                    <button
                      type="submit"
                      class="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-bold py-2 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1"
                    >
                      <Icon name="plus" className="w-3.5 h-3.5" />
                      新增時段
                    </button>
                  </form>
                </div>

                {/* 成員管理 */}
                <div class="space-y-4">
                  <h3 class="text-sm font-bold text-amber-300 flex items-center gap-1.5">
                    <Icon name="users" className="w-4 h-4" />
                    邀請 / 移除受邀成員 ({invitedMembers.length}人)
                  </h3>

                  <form onSubmit={handleAddMember} class="flex gap-2">
                    <input
                      type="text"
                      value={newMemberInput}
                      onChange={(e) => setNewMemberInput(e.target.value)}
                      placeholder="新夥伴名字"
                      class="flex-1 px-3.5 py-2 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm text-white"
                    />
                    <button
                      type="submit"
                      class="bg-amber-400 hover:bg-amber-300 text-slate-900 font-bold px-3 rounded-xl text-xs transition-all"
                    >
                      加入
                    </button>
                  </form>

                  <div class="max-h-24 overflow-y-auto border border-slate-800 p-2 rounded-xl space-y-1 bg-slate-950/50">
                    {invitedMembers.map(name => (
                      <div key={name} class="flex items-center justify-between text-xs py-1 px-2 hover:bg-slate-900 rounded">
                        <span class="text-slate-300">{name}</span>
                        <button
                          onClick={() => handleRemoveMember(name)}
                          class="text-rose-400 hover:text-rose-600"
                        >
                          <Icon name="trash-2" className="w-3 h-3" />
                        </button>
                      </div>
                    ))}
                  </div>

                  <div class="pt-2">
                    <button
                      onClick={handleResetAllVotes}
                      class="w-full bg-rose-600/20 hover:bg-rose-600 text-rose-300 hover:text-white border border-rose-500/30 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1"
                    >
                      <Icon name="trash" className="w-3.5 h-3.5" />
                      清空現有投票數據
                    </button>
                  </div>
                </div>
              </div>
            </section>
          )}

          <footer class="mt-12 text-center text-xs text-slate-400">
            <p>© 2026 AI 智慧會議排程 Agent 系統. 支援自動化最佳解推算與追蹤</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
